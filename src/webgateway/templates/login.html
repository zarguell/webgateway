{% extends "base.html" %}
{% block title %}WebGateway Admin — Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-md p-8">
      <h1 class="text-2xl font-bold text-center mb-2">WebGateway Admin</h1>
      <p class="text-sm text-gray-500 text-center mb-6">Enter your admin API key to sign in</p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/admin/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-4">
          <label for="api_key" class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
          <input type="password" id="api_key" name="api_key" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm font-mono"
                 placeholder="Paste your admin API key">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium">
          Sign In
        </button>
      </form>

      <p class="mt-4 text-xs text-gray-400 text-center">
        Session expires after 24 hours.
      </p>
    </div>
  </div>
</div>
{% endblock %}
