# Lightweight local compose stack — serpLLM + SearXNG + CDP Chrome sidecar.
#
# Usage:
#   docker compose -f docker-compose.local.yml --profile local up -d --build
#
# Requires:
#   - config.local.yaml in project root
#   - Chrome running on host with --remote-debugging-port=9222
#
# Profile-based so it can safely be merged with other compose files:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml --profile local up -d

services:
  serpllm:
    profiles: ["local"]
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.local.yaml:/app/config.yaml:ro
      - serpllm-data:/app/data
      - serpllm-logs:/app/logs
    depends_on:
      - searxng
    environment:
      - AGENT1_KEY=${AGENT1_KEY:-local-agent-key}
    restart: unless-stopped

  searxng:
    profiles: ["local"]
    image: searxng/searxng:latest
    ports:
      - "8081:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
      - ./searxng-limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-local-secret}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 2>&1 | grep -qi searxng || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  cdp-chrome:
    profiles: ["local"]
    build: services/cdp-chrome/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  invisible-playwright:
    profiles: ["local"]
    build: services/invisible-playwright/
    shm_size: 2gb
    restart: unless-stopped

  flaresolverr:
    profiles: ["local"]
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
      CAPTCHA_SOLVER: none
    restart: unless-stopped

volumes:
  serpllm-data:
  serpllm-logs:
