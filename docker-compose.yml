version: "3.9"

services:
  serpllm:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      - ./sessions:/app/sessions
      - ./data:/app/data       # SQLite DB location (keys, usage, quota, cache)
      - ./static:/app/static   # compiled MkDocs output (optional, built-in for prod)
    env_file:
      - .env
    environment:
      STEALTH_PLAYWRIGHT_URL: http://invisible-playwright:3001
    depends_on:
      - searxng
    restart: unless-stopped
    networks:
      - serpllm-net

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - serpllm-net

  # --- Crawl4AI self-hosted crawler (JS rendering + markdown) ---
  crawl4ai:
    image: unclecode/crawl4ai:0.8.6
    ports:
      - "11235:11235"
    shm_size: "1gb"
    environment:
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN:-}
    volumes:
      - crawl4ai-cache:/home/appuser/.cache
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - serpllm-net

  gluetun:
    image: qmcgaw/gluetun:latest
    profiles:
      - vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8888:8888"
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - HTTPPROXY=on
      # Uncomment and set your WireGuard keys:
      # - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      # - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      # - WIREGUARD_DNS=${WIREGUARD_DNS:-1.1.1.1}
    restart: unless-stopped
    networks:
      - serpllm-net

  # --- Stealth browser (C++-patched Firefox 150) ---
  invisible-playwright:
    image: serpllm/invisible-playwright:latest
    profiles: ["stealth", "browsers"]
    ports: ["3001:3001"]
    environment:
      - MAX_CONCURRENT_SESSIONS=3
      - SESSION_TIMEOUT=300
      - FINGERPRINT_ROTATE=true
    volumes:
      - ./sessions/invisible-playwright:/app/sessions
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    restart: unless-stopped

networks:
  serpllm-net:
    driver: bridge

volumes:
  cache-data:
  crawl4ai-cache:
