name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - name: lean
            cache_scope: lean
            extra_tags: "true"
          - name: injection
            cache_scope: injection
            build_args: |
              ENABLE_INJECTION=1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: meta
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          TAG="${{ steps.meta.outputs.TAG }}"
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SUFFIX="${{ matrix.variant.build_args && '-injection' || '' }}"
          echo "tags<<DELIM" >> "$GITHUB_OUTPUT"
          echo "${BASE}:${TAG}${SUFFIX}" >> "$GITHUB_OUTPUT"
          if [ -n "${{ matrix.variant.extra_tags }}" ]; then
            echo "${BASE}:latest" >> "$GITHUB_OUTPUT"
          fi
          echo "DELIM" >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.variant.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.cache_scope }}
          platforms: linux/amd64,linux/arm64
          build-args: ${{ matrix.variant.build_args }}
