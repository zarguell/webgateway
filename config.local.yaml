# Local development config — minimal stack
# Uses only SearXNG (search) and CDP Chrome (extract)

defaults:
  search_provider: searxng
  extract_provider: cdp_chrome
  timeout: 15

policies:
  - name: wikipedia
    match:
      domain: "*.wikipedia.org"
    extract_provider: cdp_chrome
    description: "Use CDP Chrome for JS-heavy Wikipedia pages"

providers:
  searxng:
    base_url: http://searxng:8080
    enabled: true
  cdp_chrome:
    base_url: http://cdp-chrome:9222
    timeout: 30
    enabled: true
    specialization: cdp_browser
    cost_units_per_call: 0.6

auth:
  keys:
    - id: key_agent1
      secret: local-agent-key
      label: "Local agent"
    - id: key_admin
      secret: local-admin-key
      label: "Local admin"
      admin: true

logging:
  path: logs/gateway.jsonl
  max_bytes: 10485760
  backup_count: 3

sessions:
  store_path: sessions

cache:
  enabled: true
  backend: sqlite
  db_path: data/cache.db
  default_ttl: 300
  rules:
    - match:
        content_type: search
        provider: [searxng]
      ttl: 600

dlp_policies:
  - name: local_dlp
    description: "Simplified DLP for local development"
    enabled: true
    applies_to_providers: []
    outbound_rules: []
    inbound_rules: []

mcp:
  enabled: true
  mount_path: /mcp
  json_response: true
  stateless: true

circuit_breaker:
  enabled: true
  providers:
    default:
      error_threshold: 3
      window_seconds: 30
      cooldown_seconds: 10

quotas: {}
alerts: {}

post_processing:
  default:
    stage1_extractor: trafilatura
    stage2_converter: markdownify
    stage3_clean: true
    stage4_deduplicate: false
  cleaning:
    min_content_length: 200
  providers:
    cdp_chrome:
      stage1_extractor: none
      stage2_converter: none
      stage3_clean: true
    searxng:
      stage1_extractor: none
      stage2_converter: none
      stage3_clean: true

prompt_injection:
  enabled: false

llm_judge:
  enabled: false
